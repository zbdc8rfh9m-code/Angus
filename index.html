<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>油管英語場景庫 - 真實連線版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #0f172a; color: white; margin: 0; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .sub-card { transition: all 0.3s ease; opacity: 0.4; transform: translateX(-10px); border-left: 4px solid transparent; }
        .sub-card.active { opacity: 1; transform: translateX(0); background-color: #1e293b; border-left: 4px solid #facc15; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        
        .word { display: inline-block; cursor: pointer; transition: all 0.2s; margin-right: 5px; }
        .word:hover { color: #facc15; background-color: rgba(250, 204, 21, 0.15); border-radius: 4px; transform: translateY(-2px); }
        
        .video-card:hover .cover-img { transform: scale(1.05); }
    </style>
</head>
<body>
    <div id="root">
        <div style="color: white; text-align: center; margin-top: 100px; font-size: 20px;">正在載入系統中...</div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 【完整版字幕】這次 19 秒的影片，每一句話都完整對齊了！
        const DEFAULT_VIDEOS = [
            {
                id: 'jNQXAC9IVRw',
                title: 'YouTube 史上第一支影片 (Me at the zoo)',
                cover: 'https://img.youtube.com/vi/jNQXAC9IVRw/hqdefault.jpg',
                tags: ['預設完整版', '初級'],
                subtitles: [
                    { start: 0, end: 3, en: "Alright, so here we are in front of the elephants.", zh: "好的，我們現在在這些大象面前。" },
                    { start: 3, end: 8, en: "And the cool thing about these guys is that they have really, really, really long trunks.", zh: "這些傢伙最酷的地方在於，牠們有非常非常長的鼻子。" },
                    { start: 8, end: 12, en: "And that's, that's cool.", zh: "而那，那真的很酷。" },
                    { start: 12, end: 19, en: "And that's pretty much all there is to say.", zh: "大概就是這樣了。" }
                ]
            }
        ];

        function App() {
            const [activeVideo, setActiveVideo] = useState(null);
            const [dictWord, setDictWord] = useState(null);

            const closeDict = () => setDictWord(null);

            return (
                <div className="flex flex-col h-screen bg-[#020617]">
                    <header className="flex justify-between items-center px-6 py-4 bg-[#0f172a] border-b border-slate-800 shrink-0 z-10">
                        <div className="flex items-center gap-3 cursor-pointer" onClick={() => setActiveVideo(null)}>
                            <div className="w-8 h-8 bg-yellow-400 rounded flex items-center justify-center font-bold text-slate-900">奶</div>
                            <span className="text-xl font-bold tracking-wider hover:text-yellow-400 transition">油管英語場景庫</span>
                        </div>
                    </header>

                    <main className="flex-1 overflow-y-auto hide-scrollbar relative">
                        {!activeVideo ? (
                            <HomeView onSelectVideo={setActiveVideo} />
                        ) : (
                            <VideoPlayerView video={activeVideo} onBack={() => setActiveVideo(null)} onWordClick={setDictWord} />
                        )}
                    </main>

                    {/* 字典彈出視窗 */}
                    {dictWord && (
                        <div className="absolute inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-4" onClick={closeDict}>
                            <div className="bg-[#1e293b] border border-slate-700 p-6 rounded-2xl shadow-2xl max-w-sm w-full" onClick={(e) => e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-4 border-b border-slate-700 pb-3">
                                    <h3 className="text-2xl font-bold text-yellow-400 font-serif">{dictWord.word}</h3>
                                    <button onClick={closeDict} className="text-slate-400 hover:text-white text-xl">&times;</button>
                                </div>
                                <div className="space-y-4">
                                    <div className="bg-slate-800 p-4 rounded-lg text-slate-200 text-lg flex items-center gap-3">
                                        {dictWord.isLoading ? (
                                            <span className="animate-pulse text-slate-400">🔍 {dictWord.translation}</span>
                                        ) : (
                                            <span>💡 {dictWord.translation}</span>
                                        )}
                                    </div>
                                    <div className="text-xs text-slate-500 bg-black/20 p-2 rounded">
                                        此翻譯結果由真實 API (MyMemory) 即時抓取提供。
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function HomeView({ onSelectVideo }) {
            const [customId, setCustomId] = useState("");
            const [customTranscript, setCustomTranscript] = useState("");

            const handleGenerate = () => {
                if (!customId || !customTranscript) {
                    alert("請輸入影片 ID 與轉錄稿！");
                    return;
                }

                const lines = customTranscript.split('\n').map(l => l.trim()).filter(Boolean);
                let resultSubs = [];
                let currentSub = null;

                // 更聰明的字幕解析器
                for (let i = 0; i < lines.length; i++) {
                    let line = lines[i];
                    const timeMatch = line.match(/^(\d{1,2}:)?(\d{1,2}):(\d{2})/);
                    
                    if (timeMatch) {
                        const timeStr = timeMatch[0];
                        const parts = timeStr.split(':').map(Number);
                        let seconds = parts.length === 2 ? parts[0] * 60 + parts[1] : parts[0] * 3600 + parts[1] * 60 + parts[2];

                        if (currentSub) {
                            currentSub.end = seconds;
                            resultSubs.push(currentSub);
                        }
                        currentSub = { start: seconds, end: seconds + 5, en: "", zh: "（DIY 匯入模式請專注英文聽力）" };
                        
                        let text = line.replace(timeStr, '').trim();
                        if (text) currentSub.en = text;
                    } else {
                        if (currentSub) {
                            currentSub.en += (currentSub.en ? " " : "") + line;
                        }
                    }
                }
                if (currentSub) {
                    currentSub.end = currentSub.start + 5;
                    resultSubs.push(currentSub);
                }

                const newVideo = {
                    id: customId.trim(),
                    title: `專屬影片 (${customId.trim()})`,
                    cover: `https://img.youtube.com/vi/${customId.trim()}/hqdefault.jpg`,
                    tags: ['DIY 匯入'],
                    subtitles: resultSubs
                };

                onSelectVideo(newVideo);
            };

            return (
                <div className="max-w-6xl mx-auto p-6 md:p-10 flex flex-col lg:flex-row gap-10">
                    <div className="flex-1">
                        <div className="mb-8">
                            <h1 className="text-3xl font-bold mb-2">✦ 系統預設影片</h1>
                            <p className="text-slate-400">這支影片的字幕是完整的，點擊進去測試真實翻譯 API 吧！</p>
                        </div>
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                            {DEFAULT_VIDEOS.map(video => (
                                <div key={video.id} className="video-card bg-[#0f172a] border border-slate-800 rounded-xl overflow-hidden cursor-pointer hover:border-slate-600 transition shadow-lg group" onClick={() => onSelectVideo(video)}>
                                    <div className="aspect-video overflow-hidden relative">
                                        <img src={video.cover} className="cover-img w-full h-full object-cover transition-transform duration-500" />
                                    </div>
                                    <div className="p-4">
                                        <h3 className="font-bold text-slate-200 group-hover:text-yellow-400 transition">{video.title}</h3>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="w-full lg:w-[400px] shrink-0">
                        <div className="bg-[#1e293b] border border-slate-700 p-6 rounded-2xl shadow-xl">
                            <h2 className="text-xl font-bold text-yellow-400 mb-4">🛠️ DIY 動態影片生成</h2>
                            <p className="text-sm text-slate-400 mb-6">貼上網址與 YouTube 轉錄稿，系統即時切分時間軸。</p>
                            
                            <div className="space-y-4">
                                <div>
                                    <input type="text" placeholder="輸入 YouTube 影片 ID (例如: dQw4w9WgXcQ)" value={customId} onChange={(e) => setCustomId(e.target.value)} className="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-sm focus:outline-none focus:border-yellow-400 text-white" />
                                </div>
                                <div>
                                    <textarea placeholder="貼上包含時間的 YouTube 轉錄稿..." value={customTranscript} onChange={(e) => setCustomTranscript(e.target.value)} className="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-sm h-40 focus:outline-none focus:border-yellow-400 text-white hide-scrollbar"></textarea>
                                </div>
                                <button onClick={handleGenerate} className="w-full bg-yellow-400 text-slate-900 font-bold py-3 rounded-lg hover:bg-yellow-300">🚀 立即生成</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function VideoPlayerView({ video, onBack, onWordClick }) {
            const [currentTime, setCurrentTime] = useState(0);
            const [activeIndex, setActiveIndex] = useState(-1);
            const playerRef = useRef(null);
            const scrollContainerRef = useRef(null);

            useEffect(() => {
                const loadPlayer = () => {
                    playerRef.current = new window.YT.Player('yt-player', {
                        videoId: video.id,
                        playerVars: { 'rel': 0, 'modestbranding': 1, 'playsinline': 1, 'enablejsapi': 1, 'origin': window.location.origin },
                        events: {
                            'onReady': () => {
                                setInterval(() => {
                                    if (playerRef.current && typeof playerRef.current.getCurrentTime === 'function') {
                                        setCurrentTime(playerRef.current.getCurrentTime());
                                    }
                                }, 100);
                            }
                        }
                    });
                };

                if (!window.YT) {
                    const tag = document.createElement('script');
                    tag.src = "https://www.youtube.com/iframe_api";
                    document.body.appendChild(tag);
                    window.onYouTubeIframeAPIReady = loadPlayer;
                } else {
                    loadPlayer();
                }
            }, [video]);

            useEffect(() => {
                const index = video.subtitles.findIndex(s => currentTime >= s.start && currentTime <= s.end);
                if (index !== -1 && index !== activeIndex) {
                    setActiveIndex(index);
                    const element = document.getElementById(`sub-${index}`);
                    const container = scrollContainerRef.current;
                    if (element && container) {
                        const targetScroll = element.offsetTop - (container.offsetHeight / 2) + (element.offsetHeight / 2);
                        container.scrollTo({ top: targetScroll, behavior: 'smooth' });
                    }
                }
            }, [currentTime, activeIndex, video]);

            // 【核心升級】接上真實的翻譯 API！
            const handleWordClick = async (word) => {
                const cleanWord = word.replace(/[^a-zA-Z']/g, ""); 
                if (!cleanWord) return;

                // 1. 先顯示載入中動畫
                onWordClick({ word: cleanWord, translation: "正在連線辭典尋找翻譯...", isLoading: true });

                try {
                    // 2. 呼叫真實的免費翻譯伺服器
                    const res = await fetch(`https://api.mymemory.translated.net/get?q=${cleanWord}&langpair=en|zh-TW`);
                    const data = await res.json();
                    let result = data.responseData.translatedText;

                    if (!result || result.toLowerCase() === cleanWord.toLowerCase()) {
                        result = `暫時查無「${cleanWord}」的精準翻譯。`;
                    }
                    
                    // 3. 把真實翻譯顯示出來
                    onWordClick({ word: cleanWord, translation: result, isLoading: false });
                } catch (err) {
                    onWordClick({ word: cleanWord, translation: "網路連線失敗，請稍後再試。", isLoading: false });
                }
            };

            return (
                <div className="flex flex-col lg:flex-row h-full">
                    <div className="w-full lg:w-2/3 p-4 md:p-6 flex flex-col bg-black/40 h-[40vh] lg:h-full shrink-0">
                        <button onClick={onBack} className="text-slate-400 hover:text-white mb-4 flex items-center gap-2 self-start transition bg-slate-800/50 px-3 py-1.5 rounded-full text-sm">
                            ← 返回大廳
                        </button>
                        
                        <div className="aspect-video w-full max-w-5xl mx-auto rounded-xl overflow-hidden shadow-2xl border border-slate-800 relative bg-black">
                            <div id="yt-player" className="w-full h-full absolute top-0 left-0"></div>
                        </div>
                        
                        <div className="max-w-5xl mx-auto w-full mt-4">
                            <h2 className="text-xl font-bold text-white">{video.title}</h2>
                            <p className="text-slate-500 text-sm mt-1">點擊右側字幕生詞，系統會即時連線 API 翻譯。</p>
                        </div>
                    </div>

                    <div className="w-full lg:w-1/3 border-l border-slate-800 flex flex-col bg-[#0f172a] h-[60vh] lg:h-full shrink-0">
                        <div className="px-6 py-4 border-b border-slate-800 flex justify-between items-center bg-[#0f172a] z-10 shadow-sm">
                            <h2 className="font-bold flex items-center gap-2 text-slate-200">
                                <span className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                                動態雙語字幕
                            </h2>
                        </div>
                        
                        <div className="flex-1 overflow-y-auto hide-scrollbar px-6 py-8 space-y-4 relative" ref={scrollContainerRef}>
                            {video.subtitles.map((sub, index) => (
                                <div key={index} id={`sub-${index}`} className={`sub-card p-4 rounded-xl cursor-default ${activeIndex === index ? 'active' : ''}`}>
                                    <div className="text-xl font-bold text-slate-100 leading-relaxed mb-2 font-serif">
                                        {sub.en.split(' ').map((word, wIndex) => (
                                            <span key={wIndex} className="word" onClick={() => handleWordClick(word)}>{word}</span>
                                        ))}
                                    </div>
                                    <div className="text-sm font-medium text-slate-500">{sub.zh}</div>
                                </div>
                            ))}
                            <div className="h-40"></div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
