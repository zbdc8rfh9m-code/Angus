<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的 AI 英語場景庫</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .subtitle-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); opacity: 0.3; transform: scale(0.95); }
        .subtitle-card.active { opacity: 1; transform: scale(1); border-left: 5px solid #fbbf24; background-color: white; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .word-hover:hover { background-color: #fef3c7; color: #d97706; border-radius: 4px; text-decoration: underline; }
        /* 隱藏滾動條但保持功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 【這裡設定影片與字幕】
        const CONFIG = {
            videoId: 'dQw4w9WgXcQ', // 你可以換成任何 YT 影片 ID
            subtitles: [
                { start: 0, end: 4, en: "Welcome to your immersive English scene library.", zh: "歡迎來到你的沉浸式英語場景庫。" },
                { start: 4, end: 8, en: "Don't just memorize words, live the language.", zh: "不要只是死背單字，要活用語言。" },
                { start: 8, end: 12, en: "Click any word to see its magic immediately.", zh: "點擊任何單字，立即查看它的魔力。" },
                { start: 12, end: 16, en: "This is the best way to master real English.", zh: "這是掌握道地英語的最佳方式。" },
                { start: 16, end: 20, en: "Never gonna give you up, never gonna let you down.", zh: "永遠不會放棄你，永遠不會讓你失望。" }
            ]
        };

        function App() {
            const [currentTime, setCurrentTime] = useState(0);
            const [activeSub, setActiveSub] = useState(null);
            const playerRef = useRef(null);
            const scrollRef = useRef(null);

            useEffect(() => {
                // 初始化 YouTube API
                window.onYouTubeIframeAPIReady = () => {
                    playerRef.current = new YT.Player('player', {
                        videoId: CONFIG.videoId,
                        playerVars: { 'rel': 0, 'modestbranding': 1 },
                        events: {
                            'onStateChange': (e) => {
                                if (e.data === YT.PlayerState.PLAYING) {
                                    const timer = setInterval(() => {
                                        const time = playerRef.current.getCurrentTime();
                                        setCurrentTime(time);
                                    }, 200);
                                    return () => clearInterval(timer);
                                }
                            }
                        }
                    });
                };
                if (!window.YT) {
                    const tag = document.createElement('script');
                    tag.src = "https://www.youtube.com/iframe_api";
                    document.body.appendChild(tag);
                }
            }, []);

            // 同步字幕與自動滾動
            useEffect(() => {
                const current = CONFIG.subtitles.find(s => currentTime >= s.start && currentTime <= s.end);
                if (current && current !== activeSub) {
                    setActiveSub(current);
                    // 自動滾動到當前字幕
                    const activeElem = document.getElementById(`sub-${CONFIG.subtitles.indexOf(current)}`);
                    if (activeElem) {
                        activeElem.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                }
            }, [currentTime]);

            const handleWordClick = (word) => {
                const cleanWord = word.replace(/[^a-zA-Z]/g, "");
                window.open(`https://dictionary.cambridge.org/zht/詞典/英語-漢語-繁體/${cleanWord}`, '_blank');
            };

            return (
                <div className="min-h-screen p-4 md:p-10">
                    <div className="max-w-7xl mx-auto">
                        <header className="flex items-center justify-between mb-8">
                            <div>
                                <h1 className="text-4xl font-extrabold text-slate-900 tracking-tight">奶酪包 <span className="text-yellow-500 text-lg">PRO</span></h1>
                                <p className="text-slate-500 font-medium">沉浸式真實語境，重塑英語本能</p>
                            </div>
                            <div className="hidden md:block bg-white px-4 py-2 rounded-full shadow-sm border
